<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TerraALERT</title>
  <style>
    /* ============================================================
       PEGA TODO LO QUE ESTÁ ENTRE ESTOS COMENTARIOS EN TU index.html
       — dentro del <head> pon los estilos
       — antes del cierre </body> pon el HTML + script
    ============================================================ */

    /* ---------- OVERLAY INTRO ---------- */
    #intro-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      /* fade-out al salir */
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #intro-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #intro-stars {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #intro-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: none;
    }

    #intro-sw1, #intro-sw2 {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%) scale(0);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: 19;
    }
    #intro-sw1 { width: 420px; height: 420px; border: 4px solid rgba(255,40,0,0.8); }
    #intro-sw2 { width: 300px; height: 300px; border: 2px solid rgba(255,100,0,0.5); }

    #intro-scene {
      position: relative;
      width: 580px;
      height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #intro-planet {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 360px; height: 360px;
      z-index: 1;
    }
    #intro-halo {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      box-shadow:
        0 0 0 3px rgba(80,200,255,0.25),
        0 0 30px 10px rgba(60,180,255,0.35),
        0 0 70px 30px rgba(40,140,255,0.2),
        0 0 120px 60px rgba(20,100,220,0.1);
      border: 2.5px solid rgba(100,210,255,0.5);
      z-index: 3;
      opacity: 0;
      transition: opacity 2.4s ease;
    }
    #intro-earth {
      width: 360px; height: 360px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      z-index: 2;
      opacity: 0;
      transition: opacity 2.4s ease;
    }

    #intro-logo {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #intro-terra {
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: clamp(64px, 10vw, 108px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 14px;
      line-height: 1;
      opacity: 0;
      transform: translateY(-12px) scale(0.92);
      text-shadow:
        3px 3px 0 #000, -2px -2px 0 #111,
        2px -2px 0 #000, -2px 2px 0 #111,
        0 0 40px rgba(180,220,255,0.3);
      filter: drop-shadow(0 4px 18px rgba(0,0,0,0.9));
    }

    #intro-divider {
      width: 0;
      height: 2.5px;
      background: linear-gradient(90deg, transparent, rgba(120,200,255,0.7), transparent);
      margin: 4px 0;
      opacity: 0;
    }

    #intro-alert-wrap {
      opacity: 0;
      transform: scale(2.5) translateY(-8px);
      line-height: 1;
    }
    #intro-alert-svg { width: 440px; height: 105px; overflow: visible; }

    /* ---------- BOTÓN ENTRAR ---------- */
    #intro-enter-btn {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      /* aparece con fade suave */
      transition: opacity 1s ease;

      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.6);
      font-family: 'Arial', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
    }
    #intro-enter-btn:hover {
      border-color: rgba(255,255,255,0.55);
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    #intro-enter-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* línea decorativa bajo el botón */
    #intro-enter-btn::after {
      content: '';
      display: block;
      width: 0;
      height: 1px;
      background: rgba(255,255,255,0.4);
      margin: 6px auto 0;
      transition: width 0.4s ease;
    }
    #intro-enter-btn:hover::after { width: 100%; }
  </style>
</head>
<body>

<!-- ============================================================
     PEGA ESTE SCRIPT antes del cierre </body> en tu index.html
     ============================================================ -->
<script>
(function() {
  const overlay  = document.getElementById('intro-overlay');
  const canvas   = document.getElementById('intro-stars');
  const flash    = document.getElementById('intro-flash');
  const sw1      = document.getElementById('intro-sw1');
  const sw2      = document.getElementById('intro-sw2');
  const scene    = document.getElementById('intro-scene');
  const earth    = document.getElementById('intro-earth');
  const halo     = document.getElementById('intro-halo');
  const terra    = document.getElementById('intro-terra');
  const divider  = document.getElementById('intro-divider');
  const alertW   = document.getElementById('intro-alert-wrap');
  const enterBtn = document.getElementById('intro-enter-btn');
  const sCtx     = canvas.getContext('2d');

  // ---------- Estrellas ----------
  function resizeStars() {
    canvas.width  = overlay.offsetWidth;
    canvas.height = overlay.offsetHeight;
    drawStars();
  }
  function drawStars() {
    sCtx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < 280; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const r = Math.random() * 1.4;
      const a = 0.15 + Math.random() * 0.7;
      sCtx.beginPath(); sCtx.arc(x, y, r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(255,255,255,${a})`; sCtx.fill();
    }
    for (let i = 0; i < 8; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;
      const r = 1.6 + Math.random() * 1.2;
      sCtx.beginPath(); sCtx.arc(x, y, r, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(200,230,255,${0.5 + Math.random() * 0.4})`; sCtx.fill();
    }
  }
  resizeStars();
  window.addEventListener('resize', resizeStars);

  // ---------- Audio ----------
  let actx = null;
  function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }

  function playRise(t) {
    if (!actx) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(120, actx.currentTime + t);
    o.frequency.exponentialRampToValueAtTime(700, actx.currentTime + t + 1.8);
    g.gain.setValueAtTime(0.0001, actx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.08, actx.currentTime + t + 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + t + 1.8);
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 900;
    o.connect(lp); lp.connect(g); g.connect(actx.destination);
    o.start(actx.currentTime + t); o.stop(actx.currentTime + t + 1.8);
  }

  function playBoom(t) {
    if (!actx) return;
    const buf = actx.createBuffer(1, actx.sampleRate * 1.5, actx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 0.25) * 0.95;
    const src = actx.createBufferSource(); src.buffer = buf;
    const g   = actx.createGain();
    g.gain.setValueAtTime(0.9, actx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + t + 1.5);
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 100;
    const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 20;
    src.connect(hp); hp.connect(lp); lp.connect(g); g.connect(actx.destination);
    src.start(actx.currentTime + t);
    const o = actx.createOscillator(), g2 = actx.createGain();
    o.frequency.setValueAtTime(55, actx.currentTime + t);
    o.frequency.exponentialRampToValueAtTime(18, actx.currentTime + t + 0.7);
    g2.gain.setValueAtTime(0.7, actx.currentTime + t);
    g2.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + t + 0.8);
    o.connect(g2); g2.connect(actx.destination);
    o.start(actx.currentTime + t); o.stop(actx.currentTime + t + 0.8);
  }

  function playRumble(t) {
    if (!actx) return;
    const buf = actx.createBuffer(1, actx.sampleRate * 0.9, actx.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 0.45) * 0.5;
    const src = actx.createBufferSource(); src.buffer = buf;
    const g   = actx.createGain();
    g.gain.setValueAtTime(0.3, actx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + t + 0.9);
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200;
    src.connect(lp); lp.connect(g); g.connect(actx.destination);
    src.start(actx.currentTime + t);
  }

  // ---------- Efectos visuales ----------
  function shake(el, intensity, dur) {
    const start = performance.now();
    (function step(now) {
      const t = (now - start) / dur;
      if (t >= 1) { el.style.transform = ''; return; }
      el.style.transform = `translate(${(Math.random()-.5)*intensity*(1-t)}px,${(Math.random()-.5)*intensity*(1-t)}px)`;
      requestAnimationFrame(step);
    })(performance.now());
  }

  function triggerFlash() {
    flash.style.transition = 'none'; flash.style.opacity = '0.95';
    setTimeout(() => { flash.style.transition = 'opacity 300ms ease'; flash.style.opacity = '0'; }, 55);
  }

  function triggerShockwave() {
    [sw1, sw2].forEach((s, i) => {
      s.style.transition = 'none';
      s.style.transform  = 'translate(-50%,-50%) scale(0)';
      s.style.opacity    = i === 0 ? '0.85' : '0.6';
      void s.offsetWidth;
      setTimeout(() => {
        s.style.transition = `transform ${700 + i*150}ms cubic-bezier(0.1,0.5,0.3,1), opacity ${700+i*150}ms ease`;
        s.style.transform  = 'translate(-50%,-50%) scale(3)';
        s.style.opacity    = '0';
      }, i * 120);
    });
  }

  // ---------- Animación principal ----------
  function runIntro() {
    initAudio();
    playRise(0.15);

    // Tierra aparece
    setTimeout(() => { earth.style.opacity = '1'; halo.style.opacity = '1'; }, 100);

    // TERRA fade-in
    let s = null;
    const dur = 2000;
    function animTerra(ts) {
      if (!s) s = ts;
      const t = Math.min((ts - s) / dur, 1);
      const e = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
      terra.style.opacity   = e;
      terra.style.transform = `translateY(${-12 + 12*e}px) scale(${0.92 + 0.08*e})`;
      if (t < 1) { requestAnimationFrame(animTerra); return; }

      // Divisor
      divider.style.transition = 'width 380ms ease, opacity 380ms ease';
      divider.style.opacity    = '1';
      divider.style.width      = '340px';

      // ALERT con impacto
      setTimeout(() => {
        playBoom(0); playRumble(0.05);
        triggerFlash(); triggerShockwave();
        shake(scene, 14, 500);

        alertW.style.transition = 'transform 350ms cubic-bezier(0.05,1.7,0.3,1), opacity 90ms ease';
        alertW.style.opacity    = '1';
        alertW.style.transform  = 'scale(1) translateY(0)';

        overlay.style.backgroundColor = '#1a0000';
        setTimeout(() => { overlay.style.transition = 'background-color 700ms ease'; overlay.style.backgroundColor = '#000'; }, 70);

        // Botón ENTRAR aparece 1.2s después del impacto
        setTimeout(() => { enterBtn.classList.add('visible'); }, 1200);

      }, 480);
    }
    setTimeout(() => requestAnimationFrame(animTerra), 220);
  }

  // ---------- Botón ENTRAR ----------
  enterBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    // El overlay desaparece en 1.2s (definido en el CSS transition)
    // Después de eso puedes hacer lo que necesites:
    setTimeout(() => {
      overlay.style.display = 'none'; // libera memoria
      // Aquí puedes disparar cualquier función de tu app:
      // initDashboard();
      // router.push('/dashboard');
    }, 1300);
  });

  // Arranca la animación automáticamente al cargar la página
  runIntro();
})();
</script>
